name: Deploy – Build in CI, push to GHCR, VM pulls

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./cmd/server

  build-and-push-image:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      short_sha: ${{ steps.short_sha.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: short_sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/rrussell11/aiistech-backend:main
            ghcr.io/rrussell11/aiistech-backend:sha-${{ steps.short_sha.outputs.sha }}

  deploy-vm-pull:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    environment: production
    permissions: {}

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.3.0
        env:
          DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: DEPLOY_PATH
          script_stop: true
          script: |
            cd "$DEPLOY_PATH"
            docker compose pull
            docker compose up -d
